[pytest]
# Collect both the unit tests (test_*.py) AND the stress/concurrency/scale
# suites (stress_test_*.py). The default glob is only test_*.py, which silently
# excluded the stress files — a green run gave false confidence on exactly the
# WAL-concurrency/scale paths most at risk (WI-24).
python_files = test_*.py stress_test_*.py
testpaths = tests
